components:
  schemas:
    PatchedPlace:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        external_id:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        title:
          type: string
          readOnly: true
        notes:
          type: string
          nullable: true
        visited:
          type: boolean
    PatchedTravelProjectDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        start_date:
          type: string
          format: date
          nullable: true
        places:
          type: array
          items:
            $ref: '#/components/schemas/Place'
    Place:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        external_id:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        title:
          type: string
          readOnly: true
        notes:
          type: string
          nullable: true
        visited:
          type: boolean
      required:
      - external_id
      - id
      - title
    TravelProject:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
      required:
      - id
      - name
    TravelProjectDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        start_date:
          type: string
          format: date
          nullable: true
        places:
          type: array
          items:
            $ref: '#/components/schemas/Place'
      required:
      - id
      - name
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
